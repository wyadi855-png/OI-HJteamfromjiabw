<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题库 · HJOI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f5f5f7;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.12);
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-light: #e8f1fd;
    --accent-hover: #0077ed;
    --sidebar-w: 220px;
    --header-h: 52px;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.10);

    /* difficulty colors */
    --d-beginner: #34c759;
    --d-easy: #30d158;
    --d-easy2: #5ac8fa;
    --d-mid: #ff9f0a;
    --d-hard: #ff6b6b;
    --d-harder: #ff375f;
    --d-noi: #bf5af2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOP NAV ── */
  .topnav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px;
    gap: 16px;
  }
  .topnav-logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px; font-weight: 600;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  .topnav-divider { width: 1px; height: 16px; background: var(--border-strong); }
  .topnav-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
  .topnav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .btn-primary {
    background: var(--accent); color: #fff;
    border: none; border-radius: 980px;
    padding: 6px 16px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost {
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border-strong); border-radius: 980px;
    padding: 6px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    padding-top: var(--header-h);
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    position: fixed; top: var(--header-h); left: 0; bottom: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 8px;
  }
  .sidebar::-webkit-scrollbar { width: 0; }

  .sidebar-section { margin-bottom: 4px; }
  .sidebar-label {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 10px 4px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; transition: all 0.12s;
    user-select: none;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text-primary); }
  .sidebar-item.active {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }
  .sidebar-item .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .sidebar-item .count {
    margin-left: auto; font-size: 11px; color: var(--text-tertiary);
    background: var(--surface2); border-radius: 10px; padding: 1px 7px;
  }
  .sidebar-item.active .count { background: rgba(0,113,227,0.12); color: var(--accent); }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 24px 28px;
    max-width: 1100px;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 200px; max-width: 340px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-tertiary); pointer-events: none;
  }
  .search-input {
    width: 100%; padding: 8px 12px 8px 34px;
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 980px; font-size: 13px; color: var(--text-primary);
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 13px; border-radius: 980px;
    border: 1px solid var(--border-strong);
    background: var(--surface); font-size: 12px; font-weight: 500;
    color: var(--text-secondary); cursor: pointer; transition: all 0.12s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── TABLE ── */
  .table-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .table-header {
    display: grid;
    grid-template-columns: 60px 1fr 100px 140px 100px 100px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600;
    color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;
  }
  .problem-row {
    display: grid;
    grid-template-columns: 60px 1fr 100px 140px 100px 100px;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.1s;
    cursor: pointer;
    animation: fadeIn 0.3s ease both;
  }
  .problem-row:last-child { border-bottom: none; }
  .problem-row:hover { background: var(--surface2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .col-num { font-size: 12px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  .col-title { }
  .problem-id {
    font-size: 11px; color: var(--text-tertiary); margin-bottom: 2px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .problem-name {
    font-size: 13px; font-weight: 500; color: var(--text-primary);
    display: flex; align-items: center; gap: 6px;
  }
  .problem-name a {
    color: inherit; text-decoration: none;
  }
  .problem-name a:hover { color: var(--accent); }
  .ext-icon { font-size: 10px; opacity: 0.4; }

  .col-source .source-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 500;
  }
  .source-luogu { background: #fff0f6; color: #c0392b; }
  .source-codeforces { background: #e8f4fd; color: #2980b9; }
  .source-atcoder { background: #f0fff4; color: #27ae60; }
  .source-other { background: var(--surface2); color: var(--text-secondary); }

  .diff-badge {
    display: inline-block; padding: 3px 9px; border-radius: 6px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .diff-入门 { background: #e8fdf0; color: #34c759; }
  .diff-普及- { background: #e8fdf0; color: #30c45a; }
  .diff-普及\/提高- { background: #e8f6fd; color: #32aede; }
  .diff-普及\+\/提高 { background: #fff8e6; color: #f0a500; }
  .diff-提高\+\/省选- { background: #fff0e6; color: #ff6b00; }
  .diff-省选\/NOI- { background: #ffe6e6; color: #ff3b30; }
  .diff-NOI\/NOI\+\/CTSC { background: #f3e8ff; color: #9b59b6; }

  .tags-cell { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    padding: 2px 7px; border-radius: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 10px; color: var(--text-secondary);
  }

  .col-added { font-size: 12px; }
  .added-link {
    color: var(--accent); text-decoration: none; font-weight: 500;
  }
  .added-link:hover { text-decoration: underline; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 80px 20px;
    color: var(--text-tertiary);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── PAGINATION ── */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    font-size: 13px; color: var(--text-secondary);
  }
  .page-btns { display: flex; gap: 4px; }
  .page-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong); background: var(--surface);
    font-size: 13px; cursor: pointer; transition: all 0.12s;
    display: flex; align-items: center; justify-content: center;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .page-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 20px; margin-bottom: 18px;
  }
  .stat-chip {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary);
  }
  .stat-num { font-size: 15px; font-weight: 600; color: var(--text-primary); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 16px;
    padding: 28px; width: 520px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: scale(0.96) translateY(8px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-title {
    font-size: 17px; font-weight: 600; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-close {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface2); border: none; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); transition: background 0.12s;
  }
  .modal-close:hover { background: var(--border-strong); }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 9px 12px;
    background: var(--surface2); border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); font-size: 13px; color: var(--text-primary);
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
    background: var(--surface);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* ── LOADING ── */
  .skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton-row {
    display: grid;
    grid-template-columns: 60px 1fr 100px 140px 100px 100px;
    padding: 14px 20px; gap: 16px; border-bottom: 1px solid var(--border);
  }

  /* ── TOAST ── */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    padding: 12px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-md);
    animation: toastIn 0.25s ease;
  }
  .toast.success { background: #1c1c1e; color: #fff; }
  .toast.error { background: #ff3b30; color: #fff; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 16px; }
    .table-header, .problem-row { grid-template-columns: 1fr 80px; }
    .col-source, .col-tags, .col-added { display: none; }
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <a class="topnav-logo" href="/">✦ HJOI</a>
  <div class="topnav-divider"></div>
  <span class="topnav-title">题库</span>
  <div class="topnav-right">
    <div id="addBtnWrap" style="display:none">
      <button class="btn-primary" onclick="openAddModal()">
        <span>＋</span> 添加题目
      </button>
    </div>
    <button class="btn-ghost" onclick="history.back()">返回</button>
  </div>
</nav>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">分类</div>
      <div class="sidebar-item active" data-cat="" onclick="selectCategory(this, '')">
        <span class="icon">📚</span>
        <span>全部题目</span>
        <span class="count" id="count-all">—</span>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">知识点</div>
      <div id="categoryList"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- STATS -->
    <div class="stats-bar" id="statsBar" style="display:none">
      <div class="stat-chip">
        <span class="stat-num" id="statTotal">0</span>
        <span>道题目</span>
      </div>
      <div class="stat-chip">
        <span class="stat-num" id="statCat">—</span>
        <span>个分类</span>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" id="searchInput" placeholder="搜索题号或题名…" oninput="onSearch(this.value)">
      </div>
      <div class="filter-group" id="diffFilters">
        <button class="filter-btn active" data-diff="" onclick="selectDiff(this, '')">全部</button>
        <button class="filter-btn" data-diff="入门" onclick="selectDiff(this, '入门')">入门</button>
        <button class="filter-btn" data-diff="普及-" onclick="selectDiff(this, '普及-')">普及-</button>
        <button class="filter-btn" data-diff="普及/提高-" onclick="selectDiff(this, '普及/提高-')">普及/提高-</button>
        <button class="filter-btn" data-diff="普及+/提高" onclick="selectDiff(this, '普及+/提高')">普及+/提高</button>
        <button class="filter-btn" data-diff="提高+/省选-" onclick="selectDiff(this, '提高+/省选-')">提高+/省选-</button>
        <button class="filter-btn" data-diff="省选/NOI-" onclick="selectDiff(this, '省选/NOI-')">省选/NOI-</button>
        <button class="filter-btn" data-diff="NOI/NOI+/CTSC" onclick="selectDiff(this, 'NOI/NOI+/CTSC')">NOI+</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-header">
        <div>#</div>
        <div>题目</div>
        <div>来源</div>
        <div>难度</div>
        <div>标签</div>
        <div>添加人</div>
      </div>
      <div id="problemList"></div>
      <div class="pagination" id="pagination" style="display:none">
        <span id="pageInfo">共 0 道题</span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </main>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">
      添加题目
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <div class="form-label">题号 *</div>
        <input class="form-input" id="f_pid" placeholder="P1234 / CF1234A">
      </div>
      <div class="form-group">
        <div class="form-label">来源 *</div>
        <select class="form-select" id="f_source">
          <option value="luogu">洛谷</option>
          <option value="codeforces">Codeforces</option>
          <option value="atcoder">AtCoder</option>
          <option value="other">其他</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="form-label">题名 *</div>
      <input class="form-input" id="f_title" placeholder="题目名称">
    </div>
    <div class="form-row">
      <div class="form-group">
        <div class="form-label">分类 *</div>
        <select class="form-select" id="f_category"></select>
      </div>
      <div class="form-group">
        <div class="form-label">难度</div>
        <select class="form-select" id="f_diff">
          <option value="">未知</option>
          <option>入门</option>
          <option>普及-</option>
          <option>普及/提高-</option>
          <option>普及+/提高</option>
          <option>提高+/省选-</option>
          <option>省选/NOI-</option>
          <option>NOI/NOI+/CTSC</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="form-label">题目链接</div>
      <input class="form-input" id="f_url" placeholder="https://…">
    </div>
    <div class="form-group">
      <div class="form-label">标签（逗号分隔）</div>
      <input class="form-input" id="f_tags" placeholder="贪心, 前缀和">
    </div>
    <div class="form-group">
      <div class="form-label">题目说明</div>
      <textarea class="form-textarea" id="f_desc" placeholder="解题思路、注意事项等…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeAddModal()">取消</button>
      <button class="btn-primary" onclick="submitAdd()">添加题目</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'https://api.hjoi.com.cn/api/v1';

// State
let state = {
  categoryId: '',
  difficulty: '',
  search: '',
  page: 1,
  pageSize: 20,
  total: 0,
  categories: [],
  isCoach: false,
};

let searchTimer = null;

// ── INIT ──
async function init() {
  checkAuth();
  await loadCategories();
  await loadProblems();
}

function checkAuth() {
  const token = localStorage.getItem('access_token');
  const role = localStorage.getItem('role') || '';
  const isCoach = localStorage.getItem('is_coach') === 'true' || role === 'coach';
  state.isCoach = isCoach;
  if (isCoach) {
    document.getElementById('addBtnWrap').style.display = '';
  }
}

async function loadCategories() {
  const res = await fetch(`${API}/problems/categories`);
  const cats = await res.json();
  state.categories = cats;

  const list = document.getElementById('categoryList');
  const icons = {
    'basic':'⚡','string':'🔤','dp':'🧮','search':'🔍','tree':'🌳',
    'data-structure':'📦','graph':'🕸','geometry':'📐','combinatorics':'🎲',
    'probability':'🎯','linear-algebra':'🔢','calculus':'∫','group-theory':'🔄',
    'polynomial':'📈','game-theory':'🎮','number-theory':'🔢'
  };
  list.innerHTML = cats.map(c => `
    <div class="sidebar-item" data-cat="${c.id}" onclick="selectCategory(this, '${c.id}')">
      <span class="icon">${icons[c.slug] || '📋'}</span>
      <span>${c.name}</span>
    </div>
  `).join('');

  // Fill modal select
  const sel = document.getElementById('f_category');
  sel.innerHTML = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  document.getElementById('statCat').textContent = cats.length;
  document.getElementById('statsBar').style.display = '';
}

async function loadProblems() {
  const list = document.getElementById('problemList');
  list.innerHTML = Array(6).fill(0).map(() => `
    <div class="skeleton-row">
      <div class="skeleton" style="height:16px"></div>
      <div class="skeleton" style="height:16px"></div>
      <div class="skeleton" style="height:16px"></div>
      <div class="skeleton" style="height:16px"></div>
      <div class="skeleton" style="height:16px"></div>
      <div class="skeleton" style="height:16px"></div>
    </div>
  `).join('');

  const params = new URLSearchParams({ page: state.page, page_size: state.pageSize });
  if (state.categoryId) params.set('category_id', state.categoryId);
  if (state.difficulty) params.set('difficulty', state.difficulty);
  if (state.search) params.set('search', state.search);

  const token = localStorage.getItem('access_token');
  const headers = token ? { Authorization: `Bearer ${token}` } : {};
  const res = await fetch(`${API}/problems/?${params}`, { headers });
  const data = await res.json();

  state.total = data.total || 0;
  document.getElementById('statTotal').textContent = state.total;
  document.getElementById('count-all').textContent = state.total;

  renderProblems(data.data || []);
  renderPagination(data.total || 0);
}

function renderProblems(problems) {
  const list = document.getElementById('problemList');
  if (!problems.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>暂无符合条件的题目</p></div>`;
    return;
  }

  list.innerHTML = problems.map((p, i) => {
    const num = (state.page - 1) * state.pageSize + i + 1;
    const sourceName = { luogu: '洛谷', codeforces: 'CF', atcoder: 'AT' }[p.source] || p.source;
    const sourceCls = { luogu: 'source-luogu', codeforces: 'source-codeforces', atcoder: 'source-atcoder' }[p.source] || 'source-other';
    const diffCls = 'diff-' + (p.difficulty || '').replace(/\//g, '\\/').replace(/\+/g, '\\+');
    const tags = (p.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('');
    const titleHtml = p.url
      ? `<a href="${p.url}" target="_blank" rel="noopener">${p.title} <span class="ext-icon">↗</span></a>`
      : p.title;
    const addedBy = p.profiles
      ? `<a class="added-link" href="/member/${p.profiles.username}">${p.profiles.username}</a>`
      : '<span style="color:var(--text-tertiary)">—</span>';

    return `
      <div class="problem-row" style="animation-delay:${i * 0.03}s">
        <div class="col-num">${num}</div>
        <div class="col-title">
          <div class="problem-id">${p.problem_id || ''}</div>
          <div class="problem-name">${titleHtml}</div>
          ${p.description ? `<div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">${p.description.slice(0,60)}${p.description.length>60?'…':''}</div>` : ''}
        </div>
        <div class="col-source"><span class="source-badge ${sourceCls}">${sourceName}</span></div>
        <div class="col-diff">${p.difficulty ? `<span class="diff-badge" style="${getDiffStyle(p.difficulty)}">${p.difficulty}</span>` : '—'}</div>
        <div class="col-tags tags-cell">${tags}</div>
        <div class="col-added">${addedBy}</div>
      </div>
    `;
  }).join('');
}

function getDiffStyle(diff) {
  const styles = {
    '入门': 'background:#e8fdf0;color:#34c759',
    '普及-': 'background:#e8fdf0;color:#30c45a',
    '普及/提高-': 'background:#e8f6fd;color:#32aede',
    '普及+/提高': 'background:#fff8e6;color:#f0a500',
    '提高+/省选-': 'background:#fff0e6;color:#ff6b00',
    '省选/NOI-': 'background:#ffe6e6;color:#ff3b30',
    'NOI/NOI+/CTSC': 'background:#f3e8ff;color:#9b59b6',
  };
  return styles[diff] || 'background:var(--surface2);color:var(--text-secondary)';
}

function renderPagination(total) {
  const pagination = document.getElementById('pagination');
  const pageInfo = document.getElementById('pageInfo');
  const pageBtns = document.getElementById('pageBtns');
  const totalPages = Math.ceil(total / state.pageSize);

  pageInfo.textContent = `共 ${total} 道题`;
  pagination.style.display = '';

  let btns = '';
  btns += `<button class="page-btn" onclick="goPage(${state.page - 1})" ${state.page <= 1 ? 'disabled' : ''}>‹</button>`;
  for (let p = Math.max(1, state.page - 2); p <= Math.min(totalPages, state.page + 2); p++) {
    btns += `<button class="page-btn ${p === state.page ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  }
  btns += `<button class="page-btn" onclick="goPage(${state.page + 1})" ${state.page >= totalPages ? 'disabled' : ''}>›</button>`;
  pageBtns.innerHTML = btns;
}

// ── FILTERS ──
function selectCategory(el, catId) {
  document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  state.categoryId = catId;
  state.page = 1;
  loadProblems();
}

function selectDiff(el, diff) {
  document.querySelectorAll('.filter-btn').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  state.difficulty = diff;
  state.page = 1;
  loadProblems();
}

function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.search = val.trim();
    state.page = 1;
    loadProblems();
  }, 350);
}

function goPage(p) {
  if (p < 1) return;
  state.page = p;
  loadProblems();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── ADD MODAL ──
function openAddModal() {
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

async function submitAdd() {
  const pid = document.getElementById('f_pid').value.trim();
  const title = document.getElementById('f_title').value.trim();
  const source = document.getElementById('f_source').value;
  const catId = document.getElementById('f_category').value;
  const diff = document.getElementById('f_diff').value;
  const url = document.getElementById('f_url').value.trim();
  const tagsRaw = document.getElementById('f_tags').value.trim();
  const desc = document.getElementById('f_desc').value.trim();

  if (!pid || !title) { showToast('请填写题号和题名', 'error'); return; }

  // Auto-generate URL
  let finalUrl = url;
  if (!finalUrl && source === 'luogu' && /^[PB]\d+/.test(pid)) {
    finalUrl = `https://www.luogu.com.cn/problem/${pid}`;
  }

  const tags = tagsRaw ? tagsRaw.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

  const token = localStorage.getItem('access_token');
  const res = await fetch(`${API}/problems/`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify({ problem_id: pid, title, source, url: finalUrl, difficulty: diff || null, category_id: parseInt(catId), tags, description: desc || null }),
  });

  if (res.ok) {
    showToast('题目已添加 ✓', 'success');
    closeAddModal();
    loadProblems();
    // Clear form
    ['f_pid','f_title','f_url','f_tags','f_desc'].forEach(id => document.getElementById(id).value = '');
  } else {
    const err = await res.json();
    showToast(err.detail || '添加失败', 'error');
  }
}

// ── TOAST ──
function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Close modal on overlay click
document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal();
});

init();
</script>
</body>
</html>
